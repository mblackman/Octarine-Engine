name: Android

# Builds the Android APK for the example project from a clean environment — the CI gate that any
# project on this engine still cross-compiles + links for Android. Mirrors build.yml/package.yml:
# vcpkg android deps from source (x-gha binary cache), the engine compiled to libmain.so by the NDK,
# project assets staged into the APK. No device/emulator — build-only (see android/README.md).
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  OCTARINE_NDK_VERSION: "28.2.13676358"

jobs:
  android:
    name: android (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout example project
        uses: actions/checkout@v4
        with:
          repository: mblackman/Octarine-Engine-Example
          path: example_repo

      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Host tools vcpkg needs to build some android deps from source (freetype/libpng/etc.).
      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config autoconf automake autoconf-archive libtool libltdl-dev

      # Puts cmdline-tools (sdkmanager) on PATH, exports ANDROID_SDK_ROOT/ANDROID_HOME, accepts licenses.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages (pinned NDK + cmake)
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" \
                     "ndk;${OCTARINE_NDK_VERSION}" "cmake;3.22.1"

      - name: Build APK
        working-directory: android
        run: |
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/${OCTARINE_NDK_VERSION}"
          ./gradlew assembleDebug \
            -Poctarine.projectDir="$GITHUB_WORKSPACE/example_repo" \
            --no-daemon --console=plain

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OctarineEngine-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
