name: Android

# Builds the Android APK for the example project from a clean environment — the CI gate that any
# project on this engine still cross-compiles + links for Android. Mirrors build.yml/package.yml:
# vcpkg android deps from source (x-gha binary cache), the engine compiled to libmain.so by the NDK,
# project assets staged into the APK. No device/emulator — build-only (see android/README.md).
on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  OCTARINE_NDK_VERSION: "28.2.13676358"

jobs:
  android:
    name: android (arm64-v8a)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Full history so `git rev-list --count HEAD` in the Resolve version step computes the
          # monotonic versionCode on tag pushes. Default depth 1 would return 1 every release.
          fetch-depth: 0

      - name: Checkout example project
        uses: actions/checkout@v4
        with:
          repository: mblackman/Octarine-Engine-Example
          path: example_repo

      # Tag push v0.1.2 -> versionName=0.1.2, versionCode=<commit count>. Non-tag runs leave both
      # blank and Gradle's identityProp helper falls through to project.ini / built-in defaults.
      - name: Resolve version (tag push)
        id: ver
        uses: ./.github/actions/resolve-version

      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: ./.github/actions/vcpkg-cache-env

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Host tools vcpkg needs to build some android deps from source (freetype/libpng/etc.).
      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config autoconf automake autoconf-archive libtool libltdl-dev

      # Puts cmdline-tools (sdkmanager) on PATH, exports ANDROID_SDK_ROOT/ANDROID_HOME, accepts licenses.
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages (pinned NDK + cmake)
        run: |
          sdkmanager "platforms;android-35" "build-tools;35.0.0" \
                     "ndk;${OCTARINE_NDK_VERSION}" "cmake;3.22.1"

      - name: Build APK
        working-directory: android
        env:
          OCTARINE_VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          OCTARINE_VERSION_CODE: ${{ steps.ver.outputs.version_code }}
        run: |
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/${OCTARINE_NDK_VERSION}"
          args=(assembleDebug
                -Poctarine.projectDir="$GITHUB_WORKSPACE/example_repo"
                --no-daemon --console=plain)
          [ -n "$OCTARINE_VERSION_NAME" ] && args+=(-Poctarine.versionName="$OCTARINE_VERSION_NAME")
          [ -n "$OCTARINE_VERSION_CODE" ] && args+=(-Poctarine.versionCode="$OCTARINE_VERSION_CODE")
          ./gradlew "${args[@]}"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: OctarineEngine-android-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      # Decode the release keystore on demand. Secrets are not available to fork PRs (so HAS_KEYSTORE
      # stays empty there), in which case bundleRelease falls back to the debug key — still a useful
      # build-passes signal. Pinned secret names mirror the Stage 1 contract in
      # ai/DeviceShippingPlan.md.
      - name: Decode release keystore
        id: keystore
        if: env.OCTARINE_ANDROID_KEYSTORE != ''
        env:
          OCTARINE_ANDROID_KEYSTORE: ${{ secrets.OCTARINE_ANDROID_KEYSTORE }}
        run: |
          ks="$RUNNER_TEMP/release.jks"
          printf '%s' "$OCTARINE_ANDROID_KEYSTORE" | base64 --decode > "$ks"
          echo "path=$ks" >> "$GITHUB_OUTPUT"

      # Multi-ABI shipping AAB: arm64-v8a covers all modern devices, armeabi-v7a is the long-tail
      # 32-bit floor, x86_64 lets Chromebooks + Google Play emulator deliver the right slice.
      # -Poctarine.abis triggers the manual orchestration path in android/app/build.gradle (per-ABI
      # cmake + vcpkg triplet); externalNativeBuild is bypassed. bundle.abi.enableSplit (also in
      # build.gradle) lets Play deliver per-ABI APKs from the same AAB.
      - name: Build AAB (release bundle, multi-ABI)
        working-directory: android
        env:
          OCTARINE_ANDROID_STORE_PASSWORD: ${{ secrets.OCTARINE_ANDROID_STORE_PASSWORD }}
          OCTARINE_ANDROID_KEY_ALIAS: ${{ secrets.OCTARINE_ANDROID_KEY_ALIAS }}
          OCTARINE_ANDROID_KEY_PASSWORD: ${{ secrets.OCTARINE_ANDROID_KEY_PASSWORD }}
          KEYSTORE_PATH: ${{ steps.keystore.outputs.path }}
          OCTARINE_VERSION_NAME: ${{ steps.ver.outputs.version_name }}
          OCTARINE_VERSION_CODE: ${{ steps.ver.outputs.version_code }}
        run: |
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/${OCTARINE_NDK_VERSION}"
          args=(bundleRelease
                -Poctarine.projectDir="$GITHUB_WORKSPACE/example_repo"
                -Poctarine.abis=arm64-v8a,armeabi-v7a,x86_64
                --no-daemon --console=plain)
          if [ -n "$KEYSTORE_PATH" ]; then
            args+=(-Poctarine.storeFile="$KEYSTORE_PATH"
                   -Poctarine.storePassword="$OCTARINE_ANDROID_STORE_PASSWORD"
                   -Poctarine.keyAlias="$OCTARINE_ANDROID_KEY_ALIAS"
                   -Poctarine.keyPassword="$OCTARINE_ANDROID_KEY_PASSWORD")
          fi
          [ -n "$OCTARINE_VERSION_NAME" ] && args+=(-Poctarine.versionName="$OCTARINE_VERSION_NAME")
          [ -n "$OCTARINE_VERSION_CODE" ] && args+=(-Poctarine.versionCode="$OCTARINE_VERSION_CODE")
          ./gradlew "${args[@]}"

      # Sanity gate: AAB must carry all three ABIs in base/lib/<abi>/libmain.so. A regression in
      # the multi-ABI orchestration (e.g. one triplet failing to produce libmain.so) would silently
      # ship a partial AAB; catch it here rather than at the Play upload.
      - name: Verify AAB carries every ABI
        run: |
          set -e
          aab=android/app/build/outputs/bundle/release/app-release.aab
          [ -f "$aab" ] || { echo "no AAB at $aab"; exit 1; }
          echo "=== aab listing ==="
          unzip -l "$aab"
          for required in arm64-v8a armeabi-v7a x86_64; do
            if ! unzip -l "$aab" | grep -q "base/lib/$required/libmain.so"; then
              echo "FAIL: base/lib/$required/libmain.so missing from AAB"
              exit 1
            fi
          done
          echo "PASS: AAB carries libmain.so for every ABI"

      # Third-party license attribution must ship inside base/assets/. Multi-ABI mode wires the
      # aggregator off the first ABI's configure task, so the file lives once at base/assets/
      # regardless of how many ABIs the AAB carries.
      - name: Verify AAB ships third-party licenses
        run: |
          set -e
          aab=android/app/build/outputs/bundle/release/app-release.aab
          if ! unzip -l "$aab" | grep -q "base/assets/THIRD_PARTY_LICENSES.txt"; then
            echo "FAIL: base/assets/THIRD_PARTY_LICENSES.txt missing from AAB"
            unzip -l "$aab" | grep -i license || true
            exit 1
          fi
          tmp=$(mktemp -d)
          unzip -p "$aab" base/assets/THIRD_PARTY_LICENSES.txt > "$tmp/licenses.txt"
          for port in freetype sdl3 imgui lua sol2 spdlog glm libpng; do
            grep -qi "^$port$" "$tmp/licenses.txt" || { echo "FAIL: section '$port' missing from AAB license aggregate"; exit 1; }
          done
          echo "PASS: AAB license aggregate covers all canonical ports."

      - name: Upload AAB
        uses: actions/upload-artifact@v4
        with:
          name: OctarineEngine-android-aab
          path: android/app/build/outputs/bundle/release/app-release.aab
          if-no-files-found: error
