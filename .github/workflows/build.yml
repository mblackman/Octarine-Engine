name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        preset: [editor-release, player-release]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive
          # Full history so the advisory clang-tidy step can diff against the PR base.
          fetch-depth: 0

      - name: Checkout example project (bake smoke)
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release'
        uses: actions/checkout@v4
        with:
          repository: mblackman/Octarine-Engine-Example
          ref: main
          path: example_repo

      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: ./.github/actions/vcpkg-cache-env

      - name: Install Linux build deps (SDL3 / X11 / Wayland)
        if: matrix.platform == 'linux'
        uses: ./.github/actions/linux-build-deps

      - name: Install Ninja (Windows/macOS)
        if: matrix.platform != 'linux'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC dev environment (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      # Compiler cache for the engine build (vcpkg deps are already binary-cached separately).
      # ccache integrates cleanly with GCC/Clang on Linux/macOS; the CMakeLists auto-detects it on
      # PATH and wires CMAKE_CXX_COMPILER_LAUNCHER. Skipped on Windows/MSVC where ccache support is
      # weaker. Cache is keyed per platform+preset.
      - name: Setup ccache
        if: matrix.platform != 'windows'
        uses: hendrikmuhs/ccache-action@v1
        with:
          key: ${{ matrix.platform }}-${{ matrix.preset }}
          max-size: 500M

      - name: Configure CMake
        shell: bash
        run: cmake --preset ${{ matrix.preset }} ${{ (matrix.platform == 'linux' && matrix.preset == 'editor-release') && '-DOCTARINE_ENABLE_TESTS=ON' || '' }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }} --config Release --parallel

      - name: Run engine tests (ctest)
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release'
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

      # Headless bake against the example project. Catches unresolved-asset regressions and
      # AssetCatalog::Build / startup-script breakage on every PR — the bake walks the catalog,
      # runs the startup script, and emits asset_manifest.lua. Non-zero exit fails the job;
      # an empty manifest means the catalog produced no entries, which is also a regression.
      - name: Bake smoke (example project)
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release'
        shell: bash
        run: |
          ./build/${{ matrix.preset }}/bin/release/OctarineEngine "$GITHUB_WORKSPACE/example_repo" -m bake
          test -s "$GITHUB_WORKSPACE/example_repo/asset_manifest.lua"

      - name: Check Lua API artifact drift
        id: lua_drift
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release'
        shell: bash
        run: |
          paths="lua_api.smoke.lua components.json modules.json"
          if ! git diff --quiet -- $paths; then
            echo "::error::One of $paths drifted. Run OctarineLuaApiTest (editor preset) locally and commit the regenerated files."
            git diff -- $paths | head -400
            exit 1
          fi

      - name: Upload regenerated Lua API artifacts on drift
        if: always() && steps.lua_drift.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lua-api-artifacts-from-ci
          path: |
            lua_api.smoke.lua
            components.json
            modules.json
          if-no-files-found: error

      # Advisory clang-tidy over the PR's changed .cpp files, using the compile_commands.json the
      # editor-release build just emitted. Non-blocking (continue-on-error) for now: the 81-check
      # ruleset against a codebase with no tidy history surfaces pre-existing debt, so gating hard
      # would block unrelated PRs. Staged to changed-lines-as-errors later once the set is clean.
      - name: clang-tidy (advisory)
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release' && github.event_name == 'pull_request'
        continue-on-error: true
        shell: bash
        run: |
          sudo apt-get update && sudo apt-get install -y clang-tidy
          base="${{ github.event.pull_request.base.sha }}"
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base"...HEAD -- 'src/*' 'tests/*' \
            | grep -E '\.cpp$' || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No changed .cpp files to lint."
            exit 0
          fi
          printf 'tidying:\n%s\n' "$(printf '  %s\n' "${files[@]}")"
          clang-tidy -p build/${{ matrix.preset }} "${files[@]}"

      - name: Stage runtime DLLs (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $out = "build/${{ matrix.preset }}/bin/release"
          # Ninja single-config writes directly to bin/release; vcpkg dlls already copied next to exe by CMake.
          Get-ChildItem $out

      - name: List artifact contents
        shell: bash
        run: ls -la build/${{ matrix.preset }}/bin/release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctarineEngine-${{ matrix.platform }}-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/bin/release
          if-no-files-found: error

  # Style gate. Lightweight (no vcpkg/SDL): formats only the files a PR actually changed, so the
  # large pre-existing tree never blocks on legacy style. Auto-fixable via the CMake `format` target.
  # clang-tidy runs as an advisory (non-blocking) step in the editor-release build leg above, which
  # has the compile_commands.json it needs; it will be tightened to blocking on changed lines later.
  lint:
    name: lint (clang-format)
    runs-on: ubuntu-latest
    env:
      # Pinned for reproducibility. clang-format output differs between major versions, so a floating
      # `apt install clang-format` (Ubuntu runner default) drifts from contributors' local versions and
      # churns formatting. The pip wheel is the same binary on every platform. Bump here AND re-run the
      # `format` target tree-wide when upgrading. Match locally: pipx install clang-format==<this version>
      CLANG_FORMAT_VERSION: 18.1.8
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pinned clang-format
        run: pipx install "clang-format==${CLANG_FORMAT_VERSION}"

      - name: clang-format changed files
        shell: bash
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          if [ -z "$base" ]; then base="$(git rev-parse HEAD~1 2>/dev/null || git rev-parse HEAD)"; fi
          mapfile -t files < <(git diff --name-only --diff-filter=ACMR "$base"...HEAD -- 'src/*' 'tests/*' \
            | grep -E '\.(cpp|h|hpp)$' || true)
          if [ ${#files[@]} -eq 0 ]; then
            echo "No changed C/C++ sources to format-check."
            exit 0
          fi
          printf 'checking:\n%s\n' "$(printf '  %s\n' "${files[@]}")"
          if ! clang-format --dry-run --Werror -style=file "${files[@]}"; then
            echo "::error::clang-format violations. Fix with pinned clang-format ${CLANG_FORMAT_VERSION}: cmake --build build/editor-release --target format"
            exit 1
          fi
