name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        preset: [editor-release, player-release]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout example project (bake smoke)
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release'
        uses: actions/checkout@v4
        with:
          repository: mblackman/Octarine-Engine-Example
          ref: main
          path: example_repo

      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: ./.github/actions/vcpkg-cache-env

      - name: Install Linux build deps (SDL3 / X11 / Wayland)
        if: matrix.platform == 'linux'
        uses: ./.github/actions/linux-build-deps

      - name: Install Ninja (Windows/macOS)
        if: matrix.platform != 'linux'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC dev environment (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: bash
        run: cmake --preset ${{ matrix.preset }} ${{ (matrix.platform == 'linux' && matrix.preset == 'editor-release') && '-DOCTARINE_ENABLE_TESTS=ON' || '' }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }} --config Release --parallel

      - name: Run engine tests (ctest)
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release'
        run: ctest --test-dir build/${{ matrix.preset }} --output-on-failure

      # Headless bake against the example project. Catches unresolved-asset regressions and
      # AssetCatalog::Build / startup-script breakage on every PR — the bake walks the catalog,
      # runs the startup script, and emits asset_manifest.lua. Non-zero exit fails the job;
      # an empty manifest means the catalog produced no entries, which is also a regression.
      - name: Bake smoke (example project)
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release'
        shell: bash
        run: |
          ./build/${{ matrix.preset }}/bin/release/OctarineEngine "$GITHUB_WORKSPACE/example_repo" -m bake
          test -s "$GITHUB_WORKSPACE/example_repo/asset_manifest.lua"

      - name: Check Lua API artifact drift
        id: lua_drift
        if: matrix.platform == 'linux' && matrix.preset == 'editor-release'
        shell: bash
        run: |
          paths="lua_api.smoke.lua components.json modules.json"
          if ! git diff --quiet -- $paths; then
            echo "::error::One of $paths drifted. Run OctarineLuaApiTest (editor preset) locally and commit the regenerated files."
            git diff -- $paths | head -400
            exit 1
          fi

      - name: Upload regenerated Lua API artifacts on drift
        if: always() && steps.lua_drift.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: lua-api-artifacts-from-ci
          path: |
            lua_api.smoke.lua
            components.json
            modules.json
          if-no-files-found: error

      - name: Stage runtime DLLs (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $out = "build/${{ matrix.preset }}/bin/release"
          # Ninja single-config writes directly to bin/release; vcpkg dlls already copied next to exe by CMake.
          Get-ChildItem $out

      - name: List artifact contents
        shell: bash
        run: ls -la build/${{ matrix.preset }}/bin/release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctarineEngine-${{ matrix.platform }}-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/bin/release
          if-no-files-found: error
