name: Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  build:
    name: ${{ matrix.platform }} (${{ matrix.preset }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        preset: [editor-release, player-release]
        include:
          - os: ubuntu-latest
            platform: linux
          - os: windows-latest
            platform: windows
          - os: macos-latest
            platform: macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Linux build deps (SDL3 / X11 / Wayland)
        if: matrix.platform == 'linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            pkg-config \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            libltdl-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxtst-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxss-dev \
            libwayland-dev \
            wayland-protocols \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libpulse-dev \
            libudev-dev \
            libdrm-dev \
            libgbm-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libsndio-dev \
            libdecor-0-dev

      - name: Install Ninja (Windows/macOS)
        if: matrix.platform != 'linux'
        uses: seanmiddleditch/gha-setup-ninja@v6

      - name: Setup MSVC dev environment (Windows)
        if: matrix.platform == 'windows'
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Configure CMake
        shell: bash
        run: cmake --preset ${{ matrix.preset }}

      - name: Build
        run: cmake --build build/${{ matrix.preset }} --config Release --parallel

      - name: Stage runtime DLLs (Windows)
        if: matrix.platform == 'windows'
        shell: pwsh
        run: |
          $out = "build/${{ matrix.preset }}/bin/release"
          # Ninja single-config writes directly to bin/release; vcpkg dlls already copied next to exe by CMake.
          Get-ChildItem $out

      - name: List artifact contents
        shell: bash
        run: ls -la build/${{ matrix.preset }}/bin/release

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OctarineEngine-${{ matrix.platform }}-${{ matrix.preset }}
          path: build/${{ matrix.preset }}/bin/release
          if-no-files-found: error
