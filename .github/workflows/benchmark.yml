name: Benchmark

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install Linux build deps (SDL3 / X11 / Wayland)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            pkg-config \
            autoconf \
            automake \
            autoconf-archive \
            libtool \
            libltdl-dev \
            libx11-dev \
            libxext-dev \
            libxrandr-dev \
            libxcursor-dev \
            libxtst-dev \
            libxfixes-dev \
            libxi-dev \
            libxinerama-dev \
            libxkbcommon-dev \
            libxss-dev \
            libwayland-dev \
            wayland-protocols \
            libegl1-mesa-dev \
            libgl1-mesa-dev \
            libgles2-mesa-dev \
            libdbus-1-dev \
            libibus-1.0-dev \
            libpulse-dev \
            libudev-dev \
            libdrm-dev \
            libgbm-dev \
            libasound2-dev \
            libpipewire-0.3-dev \
            libsndio-dev \
            libdecor-0-dev

      - name: Configure CMake
        shell: bash
        run: cmake --preset release -DOCTARINE_ENABLE_BENCHMARKS=ON

      - name: Build Benchmarks
        run: cmake --build cmake-build-release --target OctarineBenchmarks --config Release --parallel

      - name: Run Benchmarks
        run: ./cmake-build-release/bin/release/OctarineBenchmarks --benchmark_format=json | tee benchmark_result.json

      - name: Store benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Octarine Engine Benchmarks
          tool: 'googlecpp'
          output-file-path: benchmark_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: ${{ github.event_name == 'push' }} # Only push to gh-pages on main branch pushes
          alert-threshold: '200%'
          comment-on-alert: true
          fail-on-alert: true
          alert-comment-cc-users: '@mblackman'
