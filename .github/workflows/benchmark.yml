name: Benchmark

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

concurrency:
  group: benchmark-${{ github.ref }}
  cancel-in-progress: false

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

permissions:
  contents: write
  pull-requests: write

jobs:
  benchmark:
    name: Run Benchmarks
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: ./.github/actions/vcpkg-cache-env

      - name: Install Linux build deps (SDL3 / X11 / Wayland + self-hosted bootstrap)
        uses: ./.github/actions/linux-build-deps
        with:
          extras: cmake build-essential python3 curl zip unzip tar

      - name: Setup vcpkg
        run: |
          git clone https://github.com/Microsoft/vcpkg.git $GITHUB_WORKSPACE/vcpkg
          $GITHUB_WORKSPACE/vcpkg/bootstrap-vcpkg.sh -disableMetrics
          echo "VCPKG_ROOT=$GITHUB_WORKSPACE/vcpkg" >> $GITHUB_ENV

      - name: Configure CMake
        shell: bash
        run: cmake --preset player-profile -DOCTARINE_ENABLE_BENCHMARKS=ON

      - name: Build Benchmarks
        run: cmake --build build/player-profile --target OctarineBenchmarks --parallel

      - name: Run Micro-Benchmarks
        run: ./build/player-profile/bin/relwithdebinfo/OctarineBenchmarks --benchmark_format=json | tee benchmark_result.json

      - name: Store micro-benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Octarine Engine Micro-Benchmarks
          tool: 'googlecpp'
          output-file-path: benchmark_result.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          auto-push: false
          alert-threshold: '200%'
          comment-on-alert: false
          fail-on-alert: false
          alert-comment-cc-users: '@mblackman'

      - name: Checkout Example Game
        uses: actions/checkout@v4
        with:
          repository: mblackman/Octarine-Engine-Example
          path: example_repo

      - name: Run Macro-Benchmarks
        run: |
          chmod +x scripts/bench.sh
          chmod +x scripts/parse_bench_output.py
          OCT_BENCH_GAME=example_repo scripts/bench.sh 8 | python3 scripts/parse_bench_output.py --warmup 2 > macro_bench.json

      - name: Store macro-benchmark result
        uses: benchmark-action/github-action-benchmark@v1
        with:
          name: Octarine Engine Macro-Benchmarks
          tool: 'customSmallerIsBetter'
          output-file-path: macro_bench.json
          github-token: ${{ secrets.GITHUB_TOKEN }}
          skip-fetch-gh-pages: true
          auto-push: ${{ github.event_name == 'schedule' || github.event_name == 'workflow_dispatch' }}
          alert-threshold: '200%'
          comment-on-alert: false
          fail-on-alert: false
          alert-comment-cc-users: '@mblackman'
