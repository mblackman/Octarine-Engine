name: Android emulator

# Runtime smoke for the Android APK: boot a fresh x86_64 emulator, install the example APK, launch
# the main activity, and assert the engine reached its AssetCatalog manifest-load line via logcat.
# Mirrors ios.yml's simulator-launch assertion — catches regressions a build-only leg can't see
# (libmain.so loading, SDL_main wiring through SDLActivity, AGP asset staging at runtime path,
# Vulkan/GLES renderer init on the emulator).
#
# Emulator cold-boot on an x86_64 image takes ~3-5 min on KVM-enabled ubuntu runners, so this is
# gated on push-to-main / dispatch / nightly cron — not every PR. PR coverage stays on android.yml
# (build-only). Drop back to dispatch-only if the cost or flakiness becomes a problem.
on:
  push:
    branches: [ main ]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'   # 06:00 UTC nightly

env:
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
  OCTARINE_NDK_VERSION: "28.2.13676358"
  OCTARINE_API_LEVEL: "35"
  OCTARINE_EMULATOR_ABI: "x86_64"

jobs:
  emulator:
    name: android-emulator (x86_64, api ${{ env.OCTARINE_API_LEVEL }})
    # ubuntu-latest 4-core enables KVM, which the reactivecircus/android-emulator-runner action
    # needs for headless x86_64 boot. macOS runners ship without KVM and would fall back to a slow
    # software emulator.
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout engine
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Checkout example project
        uses: actions/checkout@v4
        with:
          repository: mblackman/Octarine-Engine-Example
          path: example_repo

      - name: Export GitHub Actions cache env (vcpkg binary cache)
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      # Same host tools android.yml needs to build vcpkg android deps from source.
      - name: Install host build tools
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build pkg-config autoconf automake autoconf-archive libtool libltdl-dev

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK packages
        run: |
          sdkmanager "platforms;android-${OCTARINE_API_LEVEL}" \
                     "build-tools;${OCTARINE_API_LEVEL}.0.0" \
                     "ndk;${OCTARINE_NDK_VERSION}" "cmake;3.22.1"

      # Build the APK for x86_64 — the emulator ABI. Triplet auto-derives via the mapping in
      # android/app/build.gradle (x86_64 -> x64-android). First run pays the full vcpkg cold cost
      # for the x64-android triplet; subsequent runs hit the x-gha binary cache.
      - name: Build x86_64 APK
        working-directory: android
        run: |
          export VCPKG_ROOT="$VCPKG_INSTALLATION_ROOT"
          export ANDROID_NDK_HOME="$ANDROID_SDK_ROOT/ndk/${OCTARINE_NDK_VERSION}"
          ./gradlew assembleDebug \
            -Poctarine.projectDir="$GITHUB_WORKSPACE/example_repo" \
            -Poctarine.abi="${OCTARINE_EMULATOR_ABI}" \
            --no-daemon --console=plain

      # KVM is gated behind /dev/kvm permissions on the ubuntu runner; the udev rule below is the
      # standard pattern from reactivecircus/android-emulator-runner README.
      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # Boot emulator → install APK → launch activity → poll logcat for the manifest-load line.
      # Mirrors ios.yml's launch+assert step. Tag is `Octarine` (set by Logger::Init's
      # spdlog::android_logger_mt — see CLAUDE.md). The catalog logs
      # "AssetCatalog: loaded N entries from manifest" once the bake is consumed; absence within
      # the budget means the APK never reached scene load.
      - name: Run APK on emulator + assert manifest-load
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ env.OCTARINE_API_LEVEL }}
          arch: ${{ env.OCTARINE_EMULATOR_ABI }}
          target: google_apis
          force-avd-creation: false
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          script: |
            set -e
            adb wait-for-device
            apk="android/app/build/outputs/apk/debug/app-debug.apk"
            [ -f "$apk" ] || { echo "missing APK at $apk"; exit 1; }
            adb install -r "$apk"
            adb logcat -c
            # Read applicationId from project.ini fallback chain — example_repo's package_id is the
            # canonical value; if missing, fall back to the gradle default. Component is
            # <pkg>/org.libsdl.app.SDLActivity (SDL3's stock activity, unchanged).
            pkg=$(awk -F= '/^[[:space:]]*package_id[[:space:]]*=/{gsub(/[[:space:]]/,"",$2); print $2; exit}' \
              "$GITHUB_WORKSPACE/example_repo/project.ini" 2>/dev/null || true)
            [ -n "$pkg" ] || pkg="com.octarine.example"
            adb shell am start -W -n "$pkg/org.libsdl.app.SDLActivity"
            manifest=0
            for i in $(seq 1 24); do
              adb logcat -d -s Octarine:I OctarineLua:I '*:S' > logcat.txt 2>&1 || true
              if grep -q "AssetCatalog: loaded .* entries from manifest" logcat.txt; then
                manifest=1
                break
              fi
              sleep 5
            done
            echo "=== logcat (Octarine subsystem, last snapshot) ==="
            cat logcat.txt || true
            echo "=== end logcat ==="
            if [ $manifest -ne 1 ]; then
              echo "FAIL: AssetCatalog manifest-load line missing within budget"
              exit 1
            fi
            echo "PASS: emulator launch reached manifest-load"

      - name: Upload logcat
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-emulator-logcat
          path: logcat.txt
          if-no-files-found: ignore
