name: Export vcpkg binary cache env
description: |
  Re-exports ACTIONS_CACHE_URL + ACTIONS_RUNTIME_TOKEN so vcpkg's x-gha
  binary-cache backend can authenticate against the GitHub Actions cache. These
  envs are set by the runner for the github-script action but not for
  shell-launched processes; the github-script step below copies them through.

  Used by every workflow that runs `cmake --preset` against the vcpkg toolchain
  (build.yml, package.yml, android.yml, ios.yml, ios-ipa.yml, benchmark.yml).
  Drift here would silently disable the binary cache and turn every PR into a
  cold vcpkg build — keep one copy.

runs:
  using: composite
  steps:
    - uses: actions/github-script@v7
      with:
        script: |
          core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
          core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');
