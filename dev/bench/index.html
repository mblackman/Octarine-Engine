<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Octarine Engine Benchmarks</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-dark: #0f0a14;
      --bg-card: rgba(30, 20, 40, 0.6);
      --text-main: #e2d8e8;
      --text-muted: #a193ad;
      --accent-yellow: #e3b341;
      --accent-purple: #9b59b6;
      --accent-gradient: linear-gradient(135deg, var(--accent-yellow), var(--accent-purple));
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
    }
    
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Inter', sans-serif;
      background-color: var(--bg-dark);
      background-image: 
        radial-gradient(circle at 15% 50%, rgba(155, 89, 182, 0.08), transparent 25%),
        radial-gradient(circle at 85% 30%, rgba(227, 179, 65, 0.05), transparent 25%);
      background-attachment: fixed;
      color: var(--text-main);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Glassmorphism utility */
    .glass {
      background: var(--bg-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--glass-border);
      box-shadow: var(--glass-shadow);
      border-radius: 16px;
    }

    header {
      position: sticky;
      top: 0;
      z-index: 100;
      padding: 1rem 2rem;
      margin: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 1rem;
    }

    .header-info {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
    }

    .header-title {
      font-size: 1.5rem;
      font-weight: 800;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-meta {
      font-size: 0.85rem;
      color: var(--text-muted);
      display: flex;
      gap: 1.5rem;
    }

    a {
      color: var(--accent-yellow);
      text-decoration: none;
      transition: color 0.2s ease, text-shadow 0.2s ease;
    }

    a:hover {
      color: #ffd770;
      text-shadow: 0 0 8px rgba(227, 179, 65, 0.4);
    }

    .dl-btn {
      padding: 0.6rem 1.2rem;
      font-family: 'Inter', sans-serif;
      font-weight: 600;
      font-size: 0.9rem;
      color: #fff;
      background: var(--accent-gradient);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .dl-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(155, 89, 182, 0.4);
    }

    main {
      flex: 1;
      padding: 2rem;
      display: flex;
      flex-direction: column;
      gap: 3rem;
      max-width: 1600px;
      margin: 0 auto;
      width: 100%;
    }

    .benchmark-set {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
      animation: fadeIn 0.8s ease forwards;
      opacity: 0;
    }
    
    .benchmark-set:nth-child(1) { animation-delay: 0.1s; }
    .benchmark-set:nth-child(2) { animation-delay: 0.3s; }
    .benchmark-set:nth-child(3) { animation-delay: 0.5s; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .benchmark-title {
      font-size: 2.2rem;
      font-weight: 800;
      border-bottom: 2px solid var(--glass-border);
      padding-bottom: 0.5rem;
      margin-bottom: 1rem;
      display: inline-block;
      align-self: flex-start;
    }

    .benchmark-graphs {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
      gap: 2rem;
    }

    .chart-container {
      padding: 1.5rem;
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
      height: 350px;
      display: flex;
      flex-direction: column;
    }

    .chart-container:hover {
      transform: translateY(-5px);
      box-shadow: 0 12px 40px 0 rgba(0, 0, 0, 0.5);
      border-color: rgba(227, 179, 65, 0.3);
    }

    .chart-wrapper {
      position: relative;
      flex-grow: 1;
      height: 100%;
      width: 100%;
    }

    footer {
      text-align: center;
      padding: 2rem;
      color: var(--text-muted);
      font-size: 0.85rem;
      border-top: 1px solid var(--glass-border);
      margin-top: 2rem;
    }

    /* Scrollbar styling */
    ::-webkit-scrollbar {
      width: 10px;
    }
    ::-webkit-scrollbar-track {
      background: var(--bg-dark);
    }
    ::-webkit-scrollbar-thumb {
      background: rgba(155, 89, 182, 0.5);
      border-radius: 5px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--accent-purple);
    }

    @media (max-width: 768px) {
      .benchmark-graphs {
        grid-template-columns: 1fr;
      }
      header {
        margin: 0.5rem;
        padding: 1rem;
      }
      main {
        padding: 1rem;
      }
      .chart-container {
        height: 300px;
      }
    }
  </style>
</head>
<body>
  <header class="glass">
    <div class="header-info">
      <div class="header-title">Octarine Engine Benchmarks</div>
      <div class="header-meta">
        <span><strong style="color: var(--text-main);">Repo:</strong> <a id="repository-link" rel="noopener" target="_blank" href="#"></a></span>
        <span><strong style="color: var(--text-main);">Updated:</strong> <span id="last-update"></span></span>
      </div>
    </div>
    <button id="dl-button" class="dl-btn">Download JSON</button>
  </header>

  <main id="main"></main>

  <footer>
    Powered by <a rel="noopener" target="_blank" href="https://github.com/marketplace/actions/continuous-benchmark">github-action-benchmark</a>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/chart.js@2.9.4/dist/Chart.min.js"></script>
  <script src="data.js"></script>
  <script id="main-script">
    'use strict';
    (function() {
      // Themed Colors
      const toolColors = {
        cargo: '#dea584',
        go: '#00add8',
        benchmarkjs: '#f1e05a',
        benchmarkluau: '#000080',
        pytest: '#3572a5',
        googlecpp: '#e3b341', // Custom Yellow
        catch2: '#9b59b6',    // Custom Purple
        julia: '#a270ba',
        jmh: '#b07219',
        benchmarkdotnet: '#178600',
        customBiggerIsBetter: '#38ff38',
        customSmallerIsBetter: '#ff3838',
        _: '#9b59b6' // Default to purple
      };

      // Set global Chart.js defaults for dark theme
      Chart.defaults.global.defaultFontColor = '#a193ad';
      Chart.defaults.global.defaultFontFamily = "'Inter', sans-serif";

      function init() {
        function collectBenchesPerTestCase(entries) {
          const map = new Map();
          for (const entry of entries) {
            const {commit, date, tool, benches} = entry;
            for (const bench of benches) {
              const result = { commit, date, tool, bench };
              
              let baseName = bench.name;
              let variantName = 'value';

              const macroMatch = bench.name.match(/(.*)\s+\[(.*)\]$/);
              const microMatch = bench.name.match(/(.*)\/(.*)$/);

              if (macroMatch) {
                baseName = macroMatch[1].trim();
                variantName = macroMatch[2].trim();
              } else if (microMatch) {
                baseName = microMatch[1].trim();
                variantName = microMatch[2].trim();
              }

              if (!map.has(baseName)) {
                map.set(baseName, new Map());
              }
              const variantsMap = map.get(baseName);
              
              if (!variantsMap.has(variantName)) {
                variantsMap.set(variantName, []);
              }
              variantsMap.get(variantName).push(result);
            }
          }
          return map;
        }

        const data = window.BENCHMARK_DATA;

        // Render header
        document.getElementById('last-update').textContent = new Date(data.lastUpdate).toLocaleString();
        const repoLink = document.getElementById('repository-link');
        repoLink.href = data.repoUrl;
        repoLink.textContent = data.repoUrl.replace('https://github.com/', '');

        // Render footer
        document.getElementById('dl-button').onclick = () => {
          const dataUrl = 'data:,' + JSON.stringify(data, null, 2);
          const a = document.createElement('a');
          a.href = dataUrl;
          a.download = 'benchmark_data.json';
          a.click();
        };

        // Prepare data points for charts
        return Object.keys(data.entries).map(name => ({
          name,
          dataSet: collectBenchesPerTestCase(data.entries[name]),
        }));
      }

      function renderAllChars(dataSets) {
        function renderGraph(parent, name, variantsMap) {
          const container = document.createElement('div');
          container.className = 'chart-container glass';
          parent.appendChild(container);

          const wrapper = document.createElement('div');
          wrapper.className = 'chart-wrapper';
          container.appendChild(wrapper);

          const canvas = document.createElement('canvas');
          wrapper.appendChild(canvas);

          // Extended color palette for variants
          const variantColors = [
            '#e3b341', // yellow
            '#9b59b6', // purple
            '#00add8', // blue
            '#f1e05a', // light yellow
            '#38ff38', // green
            '#ff3838', // red
            '#dea584'  // orange
          ];

          const datasets = [];
          let colorIndex = 0;
          let firstDataset = null;
          let labels = [];

          for (const [variantName, dataset] of variantsMap.entries()) {
            if (labels.length === 0) {
              labels = dataset.map(d => d.commit.id.slice(0, 7));
              firstDataset = dataset;
            }

            const color = variantColors[colorIndex % variantColors.length];
            
            datasets.push({
              label: variantName === 'value' ? 'Value' : variantName,
              data: dataset.map(d => d.bench.value),
              borderColor: color,
              backgroundColor: 'transparent',
              borderWidth: 3,
              pointBackgroundColor: color,
              pointBorderColor: '#fff',
              pointHoverBackgroundColor: '#fff',
              pointHoverBorderColor: color,
              pointRadius: 4,
              pointHoverRadius: 6,
              lineTension: 0.3 // smooth bezier curve
            });
            colorIndex++;
          }
          
          const data = {
            labels: labels,
            datasets: datasets,
          };

          const options = {
            responsive: true,
            maintainAspectRatio: false,
            title: {
              display: true,
              text: name,
              fontColor: '#e2d8e8',
              fontSize: 16,
              padding: 16
            },
            legend: {
              labels: { fontColor: '#e2d8e8', fontSize: 13 }
            },
            scales: {
              xAxes: [
                {
                  scaleLabel: { display: true, labelString: 'commit' },
                  gridLines: { color: 'rgba(255, 255, 255, 0.05)', zeroLineColor: 'rgba(255, 255, 255, 0.1)' }
                }
              ],
              yAxes: [
                {
                  scaleLabel: { display: true, labelString: firstDataset && firstDataset.length > 0 ? firstDataset[0].bench.unit : '' },
                  ticks: { beginAtZero: true },
                  gridLines: { color: 'rgba(255, 255, 255, 0.05)', zeroLineColor: 'rgba(255, 255, 255, 0.1)' }
                }
              ],
            },
            tooltips: {
              mode: 'index',
              intersect: false,
              backgroundColor: 'rgba(15, 10, 20, 0.9)',
              titleFontColor: '#e3b341',
              bodyFontColor: '#e2d8e8',
              borderColor: 'rgba(155, 89, 182, 0.4)',
              borderWidth: 1,
              callbacks: {
                afterTitle: items => {
                  const {index} = items[0];
                  // use first dataset for commit info
                  if (firstDataset && firstDataset[index]) {
                     const commit = firstDataset[index].commit;
                     return '\n' + commit.message + '\n\n' + commit.timestamp + ' by @' + commit.committer.username + '\n';
                  }
                  return '';
                },
                label: item => {
                  let label = item.value;
                  if (firstDataset && firstDataset[item.index]) {
                     const { unit } = firstDataset[item.index].bench;
                     label += ' ' + unit;
                  }
                  return (data.datasets[item.datasetIndex].label) + ': ' + label;
                }
              }
            },
            hover: {
              mode: 'index',
              intersect: false
            },
            onClick: (_mouseEvent, activeElems) => {
              if (activeElems.length === 0) return;
              const index = activeElems[0]._index;
              if (firstDataset && firstDataset[index]) {
                const url = firstDataset[index].commit.url;
                window.open(url, '_blank');
              }
            },
          };

          new Chart(canvas, {
            type: 'line',
            data,
            options,
          });
        }

        function renderBenchSet(name, benchSet, main) {
          const setElem = document.createElement('div');
          setElem.className = 'benchmark-set';
          main.appendChild(setElem);

          const nameElem = document.createElement('h1');
          nameElem.className = 'benchmark-title';
          // Pretty format the title
          nameElem.textContent = name;
          setElem.appendChild(nameElem);

          const graphsElem = document.createElement('div');
          graphsElem.className = 'benchmark-graphs';
          setElem.appendChild(graphsElem);

          for (const [benchName, benches] of benchSet.entries()) {
            renderGraph(graphsElem, benchName, benches)
          }
        }

        const main = document.getElementById('main');
        for (const {name, dataSet} of dataSets) {
          renderBenchSet(name, dataSet, main);
        }
      }

      renderAllChars(init());
    })();
  </script>
</body>
</html>
